name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # This job executes PR-controlled code (pytest collects it) —
          # never leave the token in .git/config while it runs.
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies (pinned, cooldown-checked; gate itself is stdlib)
        run: pip install -r requirements-dev.txt

      - name: Gate unit tests (coverage floor from pyproject.toml)
        run: python -m pytest tests/ -q --cov

  lint-type:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies (pinned)
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check scripts tests

      - name: Format check (ruff)
        run: ruff format --check scripts tests

      - name: Type check (mypy, strict)
        run: mypy

  security-hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history: gitleaks scans all commits and errors on shallow clones
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Dependency audit (pip-audit over pinned dev deps)
        run: |
          pip install pip-audit==2.10.1
          pip-audit -r requirements-dev.txt

  links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Markdown link check (lychee)
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --no-progress --max-retries 3 --accept 200..=299,429 './**/*.md'
          fail: true

  review-gate:
    # Deterministic enforcement that the review battery ran, was validated,
    # and met thresholds — docs/process/review-gate.md. PR events only (the
    # artifacts are keyed by PR number).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # PR HEAD, not the merge ref — the merge-base diff must match what
          # the orchestrator hashed locally when writing the artifacts.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Run the BASE branch's copy of the gate against the PR checkout as
      # data: a PR editing the gate script can't weaken its own enforcement —
      # it would have to visibly edit this workflow instead. Bootstrap
      # fallback: before the gate exists on the base branch, use the PR copy.
      - name: Review gate (trusted base copy; stdlib, no deps)
        env:
          # Via env, not inline interpolation — branch names must never be
          # spliced into shell text (GitHub Actions hardening guidance).
          BASE_REF: ${{ github.base_ref }}
        run: |
          BASE="origin/${BASE_REF}"
          if git cat-file -e "$BASE:scripts/review_gate.py" 2>/dev/null; then
            git show "$BASE:scripts/review_gate.py" > /tmp/trusted_review_gate.py
            echo "using trusted gate from $BASE"
          else
            cp scripts/review_gate.py /tmp/trusted_review_gate.py
            echo "::warning::bootstrap: gate not on base branch yet; using PR copy"
          fi
          python /tmp/trusted_review_gate.py \
            --pr ${{ github.event.pull_request.number }} \
            --base "$BASE"
