# Tooling config only — this repo is a Claude Code skill plus its review
# gate; it is not a distributable Python package.

[tool.ruff]
line-length = 100
target-version = "py312"
include = ["scripts/**/*.py", "tests/**/*.py"]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # import order
    "UP", # pyupgrade
    "B",  # bugbear
]

[tool.mypy]
python_version = "3.12"
strict = true
# Scope note: tests load review_gate via importlib, so review_gate.* calls
# type as Any — strict mode fully covers scripts/ and the tests' own code,
# not test-to-gate call signatures.
files = ["scripts", "tests"]

[tool.coverage.run]
branch = true
source = ["scripts"]

[tool.coverage.report]
show_missing = true
exclude_also = ["if __name__ == .__main__.:"]
# Floor set just under the measured value (100% branch after the wave-2
# gap-closing tests); patch coverage on new code is reviewed by the
# battery (docs/adr/0005, lane B).
fail_under = 99
